name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build
      
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build
      
      - name: Create release archive
        run: |
          mkdir -p release
          cp -r backend/dist release/backend
          cp -r backend/node_modules release/backend/node_modules
          cp backend/package.json release/backend/
          cp -r frontend/dist release/frontend
          tar -czvf note-system-${{ github.ref_name }}.tar.gz release
      
      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: note-system-${{ github.ref_name }}.tar.gz
          generate_release_notes: true

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/note-system-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/note-system-backend:${{ steps.version.outputs.VERSION }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/note-system-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/note-system-frontend:${{ steps.version.outputs.VERSION }}