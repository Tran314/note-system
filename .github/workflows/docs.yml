name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'

jobs:
  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify documentation files exist
        run: |
          test -f README.md && echo "README.md exists"
          test -f ARCHITECTURE.md && echo "ARCHITECTURE.md exists"
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md exists"
          test -f CHANGELOG.md && echo "CHANGELOG.md exists"
          echo "All documentation files verified"