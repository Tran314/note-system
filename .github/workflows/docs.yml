name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'BUILD_PLAN.md'
      - 'docs/**'

jobs:
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install docsify-cli
        run: npm install -g docsify-cli
      
      - name: Generate docs
        run: |
          mkdir -p docs
          cp README.md docs/_sidebar.md
          cp ARCHITECTURE.md docs/architecture.md
          cp BUILD_PLAN.md docs/build-plan.md
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Note System Docs</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css"></head><body><div id="app"></div><script>window.$docsify={loadSidebar:"_sidebar.md",name:"Note System",repo:"your-github-username/note-system"};</script><script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script></body></html>' > docs/index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs