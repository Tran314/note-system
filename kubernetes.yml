# Kubernetes Deployment Configuration
# For production deployment to Kubernetes cluster

apiVersion: v1
kind: Namespace
metadata:
  name: note-system

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: note-config
  namespace: note-system
data:
  NODE_ENV: "production"
  PORT: "3001"
  JWT_ACCESS_EXPIRES_IN: "1800"
  JWT_REFRESH_EXPIRES_IN: "604800"

---
# Secret for sensitive data
# NOTE: In production, use external secrets management (Sealed Secrets, External Secrets Operator, etc.)
# Values below are base64 encoded. Replace with your own secure values!
apiVersion: v1
kind: Secret
metadata:
  name: note-secrets
  namespace: note-system
type: Opaque
data:
  # Base64 encoded values - REPLACE WITH YOUR OWN SECURE VALUES
  # echo -n 'your-value' | base64
  DB_USER: bm90ZXVzZXI=
  DB_PASSWORD: bm90ZXBhc3MxMjM=
  DATABASE_URL: cG9zdGdyZXNxbDovL25vdGV1c2VyOm5vdGVwYXNzMTIzQHBvc3RncmVzOjU0MzIvbm90ZXN5c3RlbT9zY2hlbWE9cHVibGlj
  REDIS_HOST: cmVkaXM=
  REDIS_PORT: NjM3OQ==
  REDIS_PASSWORD: cmVkaXNwYXNzMTIz
  JWT_SECRET: cmVwbGFjZS13aXRoLXlvdXItb3duLXNlY3VyZS1yYW5kb20tc2VjcmV0LWtleQ==

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: note-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: note-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: note-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: notesystem
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: note-system
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: note-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: note-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: note-system
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: note-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: note-system-backend:latest
          envFrom:
            - configMapRef:
                name: note-config
            - secretRef:
                name: note-secrets
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: note-system
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: note-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: note-system-frontend:latest
          ports:
            - containerPort: 80

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: note-system
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

---
# PVC for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: note-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# PVC for Redis
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: note-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi